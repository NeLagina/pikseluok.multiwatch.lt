<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiwatchPikseluok</title>
</head>
<body>
    <script>
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const mode = urlParams.get("img")

        const baseUrl = "https://pikseliuok.multiwatch.lt/";
        const dataUrl = "./data.json";

        function buildUrl(entry) {
            const params = new URLSearchParams({
                x: entry.x,
                y: entry.y,
                scale: entry.scale,
                template: entry.template,
                ox: entry.ox,
                oy: entry.oy,
                tw: entry.tw,
                title: entry.title,
                convert: entry.convert
            });

            return `${baseUrl}${params.toString()}`;
        }

        window.onload = async function() {
            try {
                const response = await fetch(dataUrl);
                const data = await response.json();
                
                if (!mode) {
                     window.location.href = "https://dc.multiwatch.lt"
                }
                const entry = data[mode];

                if (!entry) {
                    return;
                }

                window.location.href = buildUrl(entry);
            } catch (error) {
                // If data.json fails to load, do nothing.
            }
        };
    </script>
</body>
</html>
