<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiwatchPikseluok</title>
</head>
<body>
    <script>
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const mode = urlParams.get(`img`);
        window.onload = function() {
            // similar behavior as clicking on a link
            const multiwatchlogo = "https://pikseliuok.lt/#x=281&y=106&scale=50&template=https%3A%2F%2Fpikseluok.multiwatch.lt%2Flogo.png&ox=260&oy=72&tw=45&title=multiwatch.LT%20logo&convert=nearestCustom";
            if (mode == "multiwatch") {
            window.location.href = multiwatchlogo;
        }  else if (mode == "sidestory") {
             window.location.href = "https://pikseliuok.lt/#x=477&y=214&scale=5.04&template=https%3A%2F%2Fpikseluok.multiwatch.lt%2Fsidestory.png&ox=328&oy=116&tw=195&title=sidestory&convert=nearestCustom"
        }   else {
            window.location.href = multiwatchlogo;
        }
    }
    </script>
</body>
</html>
